<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>jace</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/app.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Magic: The Gathering</p>
          <h1>Jace, the Price Tracker</h1>
        </div>
        <div class="summary" aria-live="polite">
          <div class="metric">
            <span class="metric-label">Cards</span>
            <strong id="card-count">0 cards</strong>
          </div>
          <div class="metric">
            <span class="metric-label">Total value</span>
            <strong><span id="portfolio-value">0.00</span> <span id="portfolio-change" class="metric-change"></span></strong>
          </div>
        </div>
      </header>

      <section class="import-panel" aria-label="Add cards">
        <div class="import-tabs" role="tablist" aria-label="Import source">
          <button class="tab active" type="button" data-import-tab="single">Single</button>
          <button class="tab" type="button" data-import-tab="file">File</button>
          <button class="tab" type="button" data-import-tab="moxfield">Moxfield</button>
        </div>
        <form id="import-form" class="import-form">
          <div class="import-fields" data-import-panel="single">
            <label>
              <span>Card</span>
              <input id="single-card" type="text" autocomplete="off" placeholder="2 Lightning Bolt (SLD) 675">
            </label>
          </div>
          <div class="import-fields hidden" data-import-panel="file">
            <label>
              <span>.txt or .csv file</span>
              <input id="card-file" type="file" accept=".txt,.csv,text/plain,text/csv">
            </label>
          </div>
          <div class="import-fields hidden" data-import-panel="moxfield">
            <label>
              <span>Moxfield URL</span>
              <input id="moxfield-url" type="url" autocomplete="off" placeholder="https://www.moxfield.com/decks/...">
            </label>
          </div>
          <label class="currency">
            <span>Currency</span>
            <select id="currency">
              <option value="eur">EUR</option>
              <option value="usd">USD</option>
              <option value="tix">TIX</option>
            </select>
          </label>
          <button id="import-submit" type="submit">Add</button>
        </form>
        <div class="progress hidden" id="import-progress" aria-hidden="true">
          <div class="progress-bar" id="import-progress-bar"></div>
        </div>
        <p id="import-status" class="import-status" aria-live="polite"></p>
        <div id="import-results" class="import-results"></div>
      </section>

      <section class="data-toolbar" aria-label="Collection tools">
        <label class="search">
          <span>Search collection</span>
          <input id="search" type="search" autocomplete="off" placeholder="Card name or set">
        </label>
        <div class="data-actions">
          <div class="action-group selection-actions" aria-live="polite" aria-label="Selection actions">
            <span id="selection-count">0 selected</span>
            <button id="delete-selected" class="danger" type="button" disabled>Delete</button>
          </div>
          <div class="action-group view-actions" aria-label="Table view">
            <details class="column-menu">
              <summary>Columns</summary>
              <div class="column-options" id="column-options" aria-label="Visible columns">
                <label><input type="checkbox" value="name" checked> Card</label>
                <label><input type="checkbox" value="set" checked> Set</label>
                <label><input type="checkbox" value="quantity" checked> Qty</label>
                <label><input type="checkbox" value="condition" checked> Condition</label>
                <label><input type="checkbox" value="language" checked> Language</label>
                <label><input type="checkbox" value="finish" checked> Finish</label>
                <label><input type="checkbox" value="latest_price" checked> Latest</label>
                <label><input type="checkbox" value="total_price" checked> Total value</label>
                <label><input type="checkbox" value="change" checked> Since first snapshot</label>
                <label><input type="checkbox" value="latest_captured_at" checked> Captured</label>
              </div>
            </details>
          </div>
          <div class="action-group price-actions" aria-label="Price update">
            <div class="refresh-status" aria-live="polite">
              <span id="refresh-state">Prices idle</span>
              <small id="refresh-times">Last check n/a · Next check n/a</small>
              <div class="progress refresh-progress hidden" id="refresh-progress" aria-hidden="true">
                <div class="progress-bar" id="refresh-progress-bar"></div>
              </div>
            </div>
            <button id="price-refresh" type="button">Update Prices</button>
          </div>
        </div>
      </section>

      <section class="layout">
        <div class="table-wrap">
          <div class="table-scroll">
            <div class="mobile-sort" aria-label="Card sorting">
              <label>
                <span>Sort</span>
                <select id="mobile-sort-key">
                  <option value="name">Card</option>
                  <option value="set">Set</option>
                  <option value="quantity">Qty</option>
                  <option value="condition">Condition</option>
                  <option value="language">Language</option>
                  <option value="finish">Finish</option>
                  <option value="latest_price">Latest</option>
                  <option value="total_price">Total value</option>
                  <option value="change">Since first snapshot</option>
                  <option value="latest_captured_at">Captured</option>
                </select>
              </label>
              <button id="mobile-sort-direction" type="button" aria-label="Toggle sort direction">Ascending</button>
            </div>
            <table>
              <thead>
                <tr>
                  <th class="select-column">
                    <input id="select-all" type="checkbox" aria-label="Select all visible cards">
                  </th>
                  <th data-column="name"><button class="sort-button" type="button" data-sort="name">Card</button></th>
                  <th data-column="set"><button class="sort-button" type="button" data-sort="set">Set</button></th>
                  <th data-column="quantity"><button class="sort-button" type="button" data-sort="quantity">Qty</button></th>
                  <th data-column="condition"><button class="sort-button" type="button" data-sort="condition">Condition</button></th>
                  <th data-column="language"><button class="sort-button" type="button" data-sort="language">Language</button></th>
                  <th data-column="finish"><button class="sort-button" type="button" data-sort="finish">Finish</button></th>
                  <th data-column="latest_price"><button class="sort-button" type="button" data-sort="latest_price">Latest</button></th>
                  <th data-column="total_price"><button class="sort-button" type="button" data-sort="total_price">Total value</button></th>
                  <th data-column="change"><button class="sort-button" type="button" data-sort="change">Since first snapshot</button></th>
                  <th data-column="latest_captured_at"><button class="sort-button" type="button" data-sort="latest_captured_at">Captured</button></th>
                </tr>
              </thead>
              <tbody id="cards"></tbody>
            </table>
          </div>
          <div class="pagination" aria-label="Pagination">
            <span id="page-status">Page 1 of 1</span>
            <div class="page-controls">
              <label>
                <span>Rows</span>
                <select id="page-size">
                  <option value="50">50</option>
                  <option value="100" selected>100</option>
                  <option value="250">250</option>
                  <option value="500">500</option>
                </select>
              </label>
              <button id="page-prev" type="button">Previous</button>
              <button id="page-next" type="button">Next</button>
            </div>
          </div>
        </div>

        <aside class="detail" id="detail" aria-labelledby="detail-title">
          <button class="detail-close" id="detail-close" type="button" aria-label="Close card details">&times;</button>
          <div id="detail-content">
            <h2 id="detail-title">No card selected</h2>
            <p class="muted">Select a row to inspect its price history.</p>
          </div>
        </aside>
      </section>
    </main>
    <div class="detail-backdrop hidden" id="detail-backdrop" aria-hidden="true"></div>
    <script src="/app.js"></script>
  </body>
</html>
