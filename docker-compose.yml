services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:18-alpine}
    container_name: jace-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mtg_prices}
      POSTGRES_USER: ${POSTGRES_USER:-mtg_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in a local .env file}
    volumes:
      - postgres18_root:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  jace:
    image: ${JACE_IMAGE:-jace:latest}
    container_name: jace
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-mtg_tracker}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-mtg_prices}
    ports:
      - "${APP_PORT:-8000}:8000"
    command: ["web", "--host", "0.0.0.0", "--port", "8000"]

volumes:
  postgres18_root:
